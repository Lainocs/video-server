<!doctype html>
<html lang="fr">
	<head>
		<meta charset="UTF-8" />
		<title>Stream VPS</title>

			body {
				background: #000;
				display: flex;
				justify-content: center;
				align-items: center;
				height: 100vh;
				margin: 0;
			}
			video {
				max-width: 90%;
				border: 2px solid #333;

			/>

		</video>
	</body>
</html>
