<!doctype html>
<html lang="fr">
	<head>
		<meta charset="UTF-8" />
		<title>Babymonster Concert</title>
		<link
			rel="icon"
			type="image/png"
			href="/favicon.png"
		/>
		<style>
			html,
			body {
				background: #000;
				margin: 0;
				padding: 0;
				height: 100%;
				width: 100%;
				overflow: hidden;
			}
			body.idle {
				cursor: none;
			}
			video {
				position: fixed;
				top: 0;
				left: 0;
				width: 100vw;
				height: 100vh;
				object-fit: cover;
				background: #000;
			}

			#audio-ui {
				position: fixed;
				bottom: 24px;
				right: 24px;
				display: flex;
				align-items: center;
				gap: 12px;
				padding: 10px 16px;
				background: rgba(0, 0, 0, 0.55);
				backdrop-filter: blur(8px);
				-webkit-backdrop-filter: blur(8px);
				border-radius: 999px;
				opacity: 0;
				transition: opacity 0.3s ease;
				pointer-events: none;
				z-index: 20;
				color: #fff;
				font-family: sans-serif;
			}
			body.idle #audio-ui {
				opacity: 0;
				pointer-events: none;
			}
			body:not(.idle) #audio-ui {
				opacity: 1;
				pointer-events: auto;
			}

			#audio-ui button {
				background: none;
				border: none;
				color: #fff;
				cursor: pointer;
				padding: 4px;
				display: flex;
				align-items: center;
				justify-content: center;
			}
			#audio-ui button svg {
				width: 22px;
				height: 22px;
			}

			#volume {
				-webkit-appearance: none;
				appearance: none;
				width: 120px;
				height: 4px;
				background: rgba(255, 255, 255, 0.3);
				border-radius: 2px;
				outline: none;
				cursor: pointer;
			}
			#volume::-webkit-slider-thumb {
				-webkit-appearance: none;
				appearance: none;
				width: 14px;
				height: 14px;
				background: #fff;
				border-radius: 50%;
				cursor: pointer;
			}
			#volume::-moz-range-thumb {
				width: 14px;
				height: 14px;
				background: #fff;
				border-radius: 50%;
				cursor: pointer;
				border: none;
			}
		</style>
	</head>
	<body>
		<video
			id="player"
			autoplay
			loop
			muted
			playsinline
			disablepictureinpicture
			disableremoteplayback
		>
			<source
				src="/video/"
				type="video/mp4"
			/>
		</video>

		<div id="audio-ui">
			<button
				id="mute-btn"
				aria-label="Activer/couper le son"
			>
				<svg
					id="icon-muted"
					viewBox="0 0 24 24"
					fill="currentColor"
				>
					<path
						d="M3 9v6h4l5 5V4L7 9H3zm13.59 3L14 9.41 15.41 8 18 10.59 20.59 8 22 9.41 19.41 12 22 14.59 20.59 16 18 13.41 15.41 16 14 14.59 16.59 12z"
					/>
				</svg>
				<svg
					id="icon-sound"
					viewBox="0 0 24 24"
					fill="currentColor"
					style="display: none"
				>
					<path
						d="M3 9v6h4l5 5V4L7 9H3zm11.5 3a4.5 4.5 0 0 0-2.5-4.03v8.05A4.5 4.5 0 0 0 14.5 12zM12 3.23v2.06a7 7 0 0 1 0 13.42v2.06a9 9 0 0 0 0-17.54z"
					/>
				</svg>
			</button>
			<input
				id="volume"
				type="range"
				min="0"
				max="1"
				step="0.01"
				value="1"
			/>
			<button
				id="fullscreen-btn"
				aria-label="Plein écran"
			>
				<svg
					id="icon-fs-enter"
					viewBox="0 0 24 24"
					fill="currentColor"
				>
					<path
						d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"
					/>
				</svg>
				<svg
					id="icon-fs-exit"
					viewBox="0 0 24 24"
					fill="currentColor"
					style="display: none"
				>
					<path
						d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"
					/>
				</svg>
			</button>
		</div>

		<script>
			const video = document.getElementById('player')
			const muteBtn = document.getElementById('mute-btn')
			const iconMuted = document.getElementById('icon-muted')
			const iconSound = document.getElementById('icon-sound')
			const volumeSlider = document.getElementById('volume')
			const fsBtn = document.getElementById('fullscreen-btn')
			const iconFsEnter = document.getElementById('icon-fs-enter')
			const iconFsExit = document.getElementById('icon-fs-exit')

			const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent)

			// Seuils plus tolérants sur mobile : le décodage est plus lent
			// et re-seeker trop souvent crée des micro-freezes en boucle.
			const HARD_SYNC_THRESHOLD = isMobile ? 1.5 : 0.5
			const SOFT_SYNC_THRESHOLD = isMobile ? 0.3 : 0.1
			const SYNC_INTERVAL_MS = isMobile ? 10000 : 3000
			// Délai de grâce après un hard-seek pour laisser la vidéo
			// finir de bufferiser avant de remesurer.
			const POST_SEEK_COOLDOWN_MS = 2000

			let latencyOffset = 0
			let lastHardSeekAt = 0

			async function fetchServerElapsed() {
				const t0 = performance.now()
				const res = await fetch('/sync', { cache: 'no-store' })
				const t1 = performance.now()
				const data = await res.json()
				latencyOffset = (t1 - t0) / 2 / 1000
				return data.elapsed + latencyOffset
			}

			function targetTime(elapsed) {
				const duration = video.duration
				if (!duration || !isFinite(duration)) return null
				return elapsed % duration
			}

			async function sync() {
				// Ne rien faire pendant un seek / buffer / pause : mesurer
				// maintenant produirait une fausse dérive et on boucle.
				if (video.seeking || video.readyState < 3 || video.paused) return
				if (Date.now() - lastHardSeekAt < POST_SEEK_COOLDOWN_MS) return

				try {
					const elapsed = await fetchServerElapsed()
					const target = targetTime(elapsed)
					if (target === null) return

					const drift = video.currentTime - target

					if (Math.abs(drift) > HARD_SYNC_THRESHOLD) {
						video.currentTime = target
						video.playbackRate = 1
						lastHardSeekAt = Date.now()
					} else if (Math.abs(drift) > SOFT_SYNC_THRESHOLD) {
						video.playbackRate = drift > 0 ? 0.97 : 1.03
					} else {
						video.playbackRate = 1
					}
				} catch (err) {
					console.error('Sync error', err)
				}
			}

			video.addEventListener('loadedmetadata', async () => {
				await sync()
				video.play().catch(() => {})
			})

			setInterval(sync, SYNC_INTERVAL_MS)

			function refreshAudioUI() {
				const muted = video.muted || video.volume === 0
				iconMuted.style.display = muted ? '' : 'none'
				iconSound.style.display = muted ? 'none' : ''
			}

			muteBtn.addEventListener('click', () => {
				if (video.muted) {
					video.muted = false
					if (video.volume === 0) {
						video.volume = 1
						volumeSlider.value = '1'
					}
				} else {
					video.muted = true
				}
				refreshAudioUI()
			})

			volumeSlider.addEventListener('input', () => {
				const v = parseFloat(volumeSlider.value)
				video.volume = v
				video.muted = v === 0
				refreshAudioUI()
			})

			video.addEventListener('volumechange', refreshAudioUI)
			refreshAudioUI()

			function refreshFullscreenUI() {
				const isFs = !!document.fullscreenElement
				iconFsEnter.style.display = isFs ? 'none' : ''
				iconFsExit.style.display = isFs ? '' : 'none'
			}

			fsBtn.addEventListener('click', () => {
				if (document.fullscreenElement) {
					document.exitFullscreen().catch(() => {})
					return
				}

				// API standard (Chrome, Firefox, Android…)
				if (document.documentElement.requestFullscreen) {
					document.documentElement.requestFullscreen().catch(() => {
						// Fallback iOS Safari : seul le <video> peut passer fullscreen,
						// via le lecteur natif QuickTime.
						if (video.webkitEnterFullscreen) video.webkitEnterFullscreen()
					})
				} else if (video.webkitEnterFullscreen) {
					video.webkitEnterFullscreen()
				}
			})

			document.addEventListener('fullscreenchange', refreshFullscreenUI)
			refreshFullscreenUI()

			// Auto-hide du curseur et de l'UI audio après inactivité.
			let idleTimer
			function wake() {
				document.body.classList.remove('idle')
				clearTimeout(idleTimer)
				idleTimer = setTimeout(() => {
					document.body.classList.add('idle')
				}, 2500)
			}
			document.addEventListener('mousemove', wake)
			document.addEventListener('touchstart', wake)
			document.addEventListener('keydown', wake)
			wake()
		</script>
	</body>
</html>
